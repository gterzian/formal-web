[package]
name = "formal-web"
version = "0.1.0"
edition = "2024"
publish = false
default-run = "formal-web"
build = "build.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
embedder = { path = "embedder" }
ffi = { path = "ffi" }
webview = { path = "webview" }
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[patch.crates-io]
anyrender = { path = "vendor/anyrender/crates/anyrender" }
anyrender_vello = { path = "vendor/anyrender/crates/anyrender_vello" }
