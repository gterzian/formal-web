[package]
name = "formal-web"
version = "0.1.0"
edition = "2024"
publish = false
default-run = "formal-web"
build = "build.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
embedder = { path = "embedder" }
ffi = { path = "ffi" }
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
