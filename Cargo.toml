[workspace]
members = [
    ".",
    "automation",
    "content",
    "embedder",
    "ipc_messages",
    "media",
    "net",
    "user_agent",
    "verification",
    "webview",
    "tests/wpt_runner",
]
exclude = ["vendor/blitz", "vendor/anyrender"]
resolver = "2"

[workspace.package]
version = "0.3.0-alpha.4"
license = "MIT OR Apache-2.0"
homepage = "https://github.com/dioxuslabs/blitz"
repository = "https://github.com/dioxuslabs/blitz"
categories = ["gui"]
edition = "2024"
rust-version = "1.89.0"

[workspace.dependencies]
# Blitz dependencies (in-repo)
blitz = { version = "=0.3.0-alpha.4", path = "./vendor/blitz/packages/blitz" }
blitz-dom = { version = "=0.3.0-alpha.4", path = "./vendor/blitz/packages/blitz-dom", default-features = false }
blitz-html = { version = "=0.3.0-alpha.4", path = "./vendor/blitz/packages/blitz-html", default-features = false }
blitz-net = { version = "=0.3.0-alpha.4", path = "./vendor/blitz/packages/blitz-net", default-features = false }
blitz-paint = { version = "=0.3.0-alpha.4", path = "./vendor/blitz/packages/blitz-paint", default-features = false }
blitz-shell = { version = "=0.3.0-alpha.4", path = "./vendor/blitz/packages/blitz-shell", default-features = false }
blitz-traits = { version = "=0.3.0-alpha.4", path = "./vendor/blitz/packages/blitz-traits", default-features = false }
stylo_taffy = { version = "=0.3.0-alpha.4", path = "./vendor/blitz/packages/stylo_taffy", default-features = false }
dioxus-native = { version = "0.7.0", path = "./vendor/blitz/packages/dioxus-native", default-features = false }
dioxus-native-dom = { version = "0.7.0", path = "./vendor/blitz/packages/dioxus-native-dom", default-features = false }
debug_timer = { version = "0.1.2", path = "./vendor/blitz/packages/debug_timer" }
accesskit_xplat = { version = "0.1", path = "./vendor/blitz/packages/accesskit_xplat", default-features = false }
browser-persistence = { path = "./vendor/blitz/apps/browser/persistence" }

# AnyRender dependencies (in-repo)
anyrender = { version = "0.10.0", path = "./vendor/anyrender/crates/anyrender" }
anyrender_serialize = { version = "0.3.0", path = "./vendor/anyrender/crates/anyrender_serialize" }
anyrender_skia = { version = "0.8.0", path = "./vendor/anyrender/crates/anyrender_skia" }
anyrender_vello = { version = "0.10.1", path = "./vendor/anyrender/crates/anyrender_vello" }
anyrender_vello_cpu = { version = "0.12.1", path = "./vendor/anyrender/crates/anyrender_vello_cpu" }
anyrender_vello_hybrid = { version = "0.5.1", path = "./vendor/anyrender/crates/anyrender_vello_hybrid" }
anyrender_svg = { version = "0.11.0", path = "./vendor/anyrender/crates/anyrender_svg" }
wgpu_context = { version = "0.6.0", path = "./vendor/anyrender/crates/wgpu_context" }
pixels_window_renderer = { version = "0.5.0", path = "./vendor/anyrender/crates/pixels_window_renderer" }
softbuffer_window_renderer = { version = "0.5.0", path = "./vendor/anyrender/crates/softbuffer_window_renderer" }

# Servo dependencies
style = { version = "0.17.0", package = "stylo" }
style_traits = { version = "0.17.0", package = "stylo_traits" }
style_atoms = { version = "0.17.0", package = "stylo_atoms" }
style_config = { version = "0.17.0", package = "stylo_static_prefs" }
style_dom = { version = "0.17.0", package = "stylo_dom" }
selectors = { version = "0.38.0", package = "selectors" }
cssparser = { version = "0.37.0" }

# HTML5ever dependencies
markup5ever = "0.39.0" # needs to match stylo web_atoms version
html5ever = "0.39.0"   # needs to match stylo web_atoms version
xml5ever = "0.39.0"    # needs to match stylo web_atoms version

# Other Servo dependencies
euclid = "0.22"
atomic_refcell = "0.1.13"
app_units = "0.7.5"
smallvec = "1"

# DioxusLabs dependencies
dioxus = { version = "0.7.3" }
dioxus-core = { version = "0.7.3" }
dioxus-html = { version = "0.7.3" }
dioxus-hooks = { version = "0.7.3" }
dioxus-signals = { version = "0.7.3" }
dioxus-stores = { version = "0.7.3" }
dioxus-asset-resolver = { version = "0.7.3" }
manganis = { version = "0.7.3" }
dioxus-document = { version = "0.7.3" }
dioxus-history = { version = "0.7.3" }

# Dioxus hot reload
dioxus-devtools = { version = "0.7.3" }
dioxus-cli-config = { version = "0.7.3" }

# Dioxus Prelude
dioxus-core-macro = { version = "0.7.3" }

# Taffy + Parley + Fontations
taffy = { version = "=0.11.0-experimental-cache-fix.3", default-features = false, features = [
    "std",
    "flexbox",
    "grid",
    "block_layout",
    "content_size",
    "calc",
    "detailed_layout_info",
] }
parley = { version = "0.9", default-features = false, features = ["std"] }
skrifa = { version = "0.42", default-features = false, features = [
    "std",
] } # Should match parley and vello versions

# Linebender + Fontations + WGPU + SVG
color = "0.3"
linebender_resource_handle = "0.1"
peniko = "0.6.0"
kurbo = "0.13.1"
wgpu = "29"
usvg = { version = "0.46", default-features = false }

# Windowing & Input
raw-window-handle = "0.6.0"
winit = { version = "=0.31.0-beta.2" }
accesskit = "0.24"
arboard = { version = "3.4.1", default-features = false }
rfd = { version = "0.17.1", default-features = false }
keyboard-types = "0.7"
cursor-icon = "1"

# IO & Networking
url = "2.5.0"
http = "1.1.0"
data-url = "0.3.1"
tokio = "1.42"
reqwest = { version = "0.13", default-features = false }
reqwest-middleware = { version = "0.5.1", default-features = false }
http-cache-reqwest = { version = "=1.0.0-alpha.6", default-features = false }
http-cache = { version = "=1.0.0-alpha.6", default-features = false }

# Media & Decoding
image = { version = "=0.25.6", default-features = false }
wuff = "0.2"
html-escape = "0.2.13"
percent-encoding = "2.3.1"
png = "0.18"
serde = "1"

# Dioxus Native
webbrowser = "1.0"
directories = "6.0.0"

# WASM
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
tracing-wasm = "0.2.1"
web-sys = "0.3.98"
web-time = "1"
console_error_panic_hook = "0.1"

# Other dependencies
rustc-hash = "2.1.2"
bytes = "1.7.1"
slab = "0.4.9"
tracing = "0.1.40"
tracing-subscriber = "0.3"
futures-util = "0.3.30"
futures-intrusive = "0.5.0"
futures-channel = "0.3"
pollster = "0.4"
smol_str = "0.3"
bitflags = "2.8.0"
bytemuck = "1"
rayon = "1"
thread_local = "1"

# AnyRender specific extra dependencies
zip = { version = "2.1", default-features = false, features = ["deflate"] }
sha2 = "0.10"
skera = "=0.1.0"
read-fonts = "0.37"
ttf2woff2 = "0.11"
glifo = "=0.1.0"
vello = { version = "0.9", features = ["wgpu"] }
vello_cpu = { version = "=0.0.8", default-features = false, features = [
  "std",
  "text",
  "u8_pipeline",
] }
vello_hybrid = "=0.0.8"
vello_common = "=0.0.8"
softbuffer = "0.4"
pixels = "0.17"

[package]
name = "formal-web"
version = "0.1.0"
edition = "2024"
publish = false
default-run = "formal-web"
build = "build.rs"

[[bin]]
name = "formal-web"
path = "src/main.rs"

[patch.crates-io]
anyrender = { path = "./vendor/anyrender/crates/anyrender" }
anyrender_skia = { path = "./vendor/anyrender/crates/anyrender_skia" }
anyrender_vello = { path = "./vendor/anyrender/crates/anyrender_vello" }
anyrender_vello_cpu = { path = "./vendor/anyrender/crates/anyrender_vello_cpu" }
anyrender_vello_hybrid = { path = "./vendor/anyrender/crates/anyrender_vello_hybrid" }
anyrender_svg = { path = "./vendor/anyrender/crates/anyrender_svg" }
wgpu_context = { path = "./vendor/anyrender/crates/wgpu_context" }

[features]
default = ["media"]
media = ["dep:media", "user_agent/media"]

[dependencies]
automation = { path = "automation" }
clap = { version = "4.5", features = ["derive"] }
content = { path = "content" }
media = { path = "media", optional = true }
net = { path = "net" }
user_agent = { path = "user_agent", default-features = false }
verification = { path = "verification" }
webview = { path = "webview" }
wpt_runner = { path = "tests/wpt_runner" }
ipc-channel = "0.21"
ipc_messages = { path = "ipc_messages" }
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
url = "2"


