[package]
name = "formal-web"
version = "0.1.0"
edition = "2024"
publish = false
default-run = "formal-web"
build = "build.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
embedder = { path = "embedder" }
user_agent = { path = "user_agent" }
webview = { path = "webview" }
ipc-channel = "0.21"
ipc_messages = { path = "ipc_messages" }
libc = "0.2"
mime_guess = "2"
reqwest = { version = "0.12.28", default-features = false, features = ["blocking", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
url = "2"

[patch.crates-io]
anyrender = { path = "vendor/anyrender/crates/anyrender" }
anyrender_vello = { path = "vendor/anyrender/crates/anyrender_vello" }
