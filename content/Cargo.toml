[package]
name = "content"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
anyrender = { version = "0.8", features = ["serde"] }
boa_engine = { path = "../scratchpad/boa/core/engine", default-features = false }
boa_gc = { path = "../scratchpad/boa/core/gc" }
blitz-dom = { path = "../vendor/blitz/packages/blitz-dom", default-features = false, features = ["svg", "system_fonts"] }
blitz-paint = { path = "../vendor/blitz/packages/blitz-paint", default-features = false, features = ["svg"] }
blitz-traits = { path = "../vendor/blitz/packages/blitz-traits", default-features = false }
ipc_messages = { path = "../ipc_messages" }
data-url = "0.3"
html5ever = "0.37"
ipc-channel = "0.21"
keyboard-types = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
url = "2"
xml5ever = "0.37"
