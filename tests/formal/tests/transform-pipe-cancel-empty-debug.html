<!DOCTYPE html>
<meta charset="utf-8">
<title>transform pipe cancel empty debug</title>
<script>
function finish(status, message) {
  window.__formalWebTestResult = {
    location: "",
    title: String(document.title || ""),
    tests: [
      {
        name: "transform pipe cancel empty debug",
        status,
        message,
        stack: null,
      },
    ],
    status: {
      status,
      message,
      stack: null,
    },
    asserts: [],
  };
}

const error1 = new Error("error1 message");
error1.name = "error1";

const rs = new ReadableStream();
const ts = new TransformStream();

let pipeState = "pending";
let cancelState = "pending";

const pipePromise = rs.pipeTo(ts.writable).then(
  value => {
    pipeState = `resolved:${String(value)}`;
  },
  error => {
    pipeState = error === error1
      ? "rejected:same"
      : `rejected:${error && error.name ? error.name : String(error)}`;
  },
);

const cancelPromise = ts.readable.cancel(error1).then(
  value => {
    cancelState = `resolved:${String(value)}`;
  },
  error => {
    cancelState = error === error1
      ? "rejected:same"
      : `rejected:${error && error.name ? error.name : String(error)}`;
  },
);

Promise.allSettled([pipePromise, cancelPromise]).then(() => {
  finish(1, JSON.stringify({ pipeState, cancelState }));
});

setTimeout(() => {
  finish(1, JSON.stringify({ pipeState, cancelState, timeout: true }));
}, 200);
</script>
