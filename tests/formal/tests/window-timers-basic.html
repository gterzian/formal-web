<!DOCTYPE html>
<meta charset="utf-8">
<title>window timers basic</title>
<script>
const tests = [];

function record(name, status, message = null) {
  tests.push({ name, status, message, stack: null });
}

function finish() {
  const firstFailure = tests.find((test) => test.status !== 0) || null;
  window.__formalWebTestResult = {
    location: "",
    title: String(document.title || ""),
    tests,
    status: {
      status: firstFailure ? 1 : 0,
      message: firstFailure ? firstFailure.message : null,
      stack: null,
    },
    asserts: [],
  };
}

let clearedTimeoutFired = false;
let intervalFirings = 0;
let clearedIntervalFiredAgain = false;

const canceledTimeoutId = setTimeout(() => {
  clearedTimeoutFired = true;
}, 0);
clearTimeout(canceledTimeoutId);

let intervalId = 0;
intervalId = setInterval(() => {
  intervalFirings += 1;
  if (intervalFirings === 2) {
    clearInterval(intervalId);
    return;
  }
  if (intervalFirings > 2) {
    clearedIntervalFiredAgain = true;
  }
}, 0);

setTimeout(() => {
  record("setTimeout queues a timer task", 0);

  setTimeout(() => {
    if (clearedTimeoutFired) {
      record("clearTimeout removes a queued timeout", 1, "cleared timeout fired");
    } else {
      record("clearTimeout removes a queued timeout", 0);
    }

    setTimeout(() => {
      if (intervalFirings !== 2) {
        record(
          "setInterval repeats until clearInterval removes it",
          1,
          `expected 2 interval firings but saw ${intervalFirings}`,
        );
      } else if (clearedIntervalFiredAgain) {
        record(
          "setInterval repeats until clearInterval removes it",
          1,
          "cleared interval fired again",
        );
      } else {
        record("setInterval repeats until clearInterval removes it", 0);
      }

      finish();
    }, 30);
  }, 20);
}, 0);
</script>
<p>Verifies the Window timer APIs backed by the Lean timer worker.</p>
