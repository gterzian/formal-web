<!DOCTYPE html>
<meta charset="utf-8">
<title>writable write.any instrumented</title>
<script src="/resources/testharness.js"></script>
<script>
setup({ output: false });
window.__instrumentedProgress = [];
window.__instrumentedCompletion = null;
window.__instrumentedStarts = [];
window.__instrumentedErrors = [];
window.__instrumentedSawLoad = false;

function finish(status, message, tests) {
  window.__formalWebTestResult = {
    location: "",
    title: String(document.title || ""),
    tests,
    status: {
      status,
      message,
      stack: null,
    },
    asserts: [],
  };
}

window.addEventListener("load", () => {
  window.__instrumentedSawLoad = true;
}, { once: true });

window.addEventListener("error", (event) => {
  window.__instrumentedErrors.push({
    message: event.message ?? null,
    filename: event.filename ?? null,
    lineno: event.lineno ?? null,
  });
});

add_start_callback((properties) => {
  window.__instrumentedStarts.push({
    timeout_multiplier: properties.timeout_multiplier ?? null,
    explicit_done: properties.explicit_done ?? null,
  });
});

add_result_callback((test) => {
  window.__instrumentedProgress.push({
    name: test.name,
    status: test.status,
    message: test.message ?? null,
  });
});

add_completion_callback((tests, harnessStatus) => {
  window.__instrumentedCompletion = {
    harnessStatus: harnessStatus.status,
    progressCount: window.__instrumentedProgress.length,
  };
  finish(
    harnessStatus.status,
    harnessStatus.message ?? null,
    tests.map((test) => ({
      name: test.name,
      status: test.status,
      message: test.message ?? null,
      stack: test.stack ?? null,
    })),
  );
});

setTimeout(() => {
  if (window.__formalWebTestResult) {
    return;
  }

  finish(
    1,
    JSON.stringify({
      sawLoad: window.__instrumentedSawLoad,
      starts: window.__instrumentedStarts,
      progress: window.__instrumentedProgress,
      completion: window.__instrumentedCompletion,
      errors: window.__instrumentedErrors,
      promiseTestType: typeof promise_test,
      delayType: typeof delay,
      recordingWritableStreamType: typeof recordingWritableStream,
    }),
    [{
      name: "instrumented write.any fallback",
      status: 1,
      message: JSON.stringify({
        sawLoad: window.__instrumentedSawLoad,
        startCount: window.__instrumentedStarts.length,
        progressCount: window.__instrumentedProgress.length,
        errorCount: window.__instrumentedErrors.length,
        promiseTestType: typeof promise_test,
        delayType: typeof delay,
        recordingWritableStreamType: typeof recordingWritableStream,
      }),
      stack: null,
    }],
  );
}, 3000);
</script>
<script src="/streams/resources/test-utils.js"></script>
<script src="/streams/resources/recording-streams.js"></script>
<script src="/streams/writable-streams/write.any.js"></script>
<p>Runs the upstream writable write.any.js file under an instrumented harness page.</p>
