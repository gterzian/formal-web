<!DOCTYPE html>
<meta charset="utf-8">
<title>transform controller error after cancel debug</title>
<script>
function finish(status, message) {
  window.__formalWebTestResult = {
    location: "",
    title: String(document.title || ""),
    tests: [
      {
        name: "transform controller error after cancel debug",
        status,
        message,
        stack: null,
      },
    ],
    status: {
      status,
      message,
      stack: null,
    },
    asserts: [],
  };
}

const thrownError = new Error("controller error");
const ignoredError = new Error("ignored cancel reason");

let controller;
const ts = new TransformStream({
  start(c) {
    controller = c;
  },
});

let cancelState = "pending";
let closedState = "pending";

const cancelPromise = ts.readable.cancel(ignoredError).then(
  value => {
    cancelState = `resolved:${String(value)}`;
  },
  error => {
    cancelState = error === thrownError
      ? "rejected:same"
      : `rejected:${error && error.name ? error.name : String(error)}`;
  },
);

controller.error(thrownError);

const closedPromise = ts.writable.getWriter().closed.then(
  value => {
    closedState = `resolved:${String(value)}`;
  },
  error => {
    closedState = error === thrownError
      ? "rejected:same"
      : `rejected:${error && error.name ? error.name : String(error)}`;
  },
);

Promise.allSettled([cancelPromise, closedPromise]).then(() => {
  finish(1, JSON.stringify({ cancelState, closedState }));
});
</script>
