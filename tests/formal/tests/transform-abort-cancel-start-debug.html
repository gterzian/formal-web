<!DOCTYPE html>
<meta charset="utf-8">
<title>transform abort cancel start debug</title>
<script>
function finish(status, message) {
  window.__formalWebTestResult = {
    location: "",
    title: String(document.title || ""),
    tests: [
      {
        name: "transform abort cancel start debug",
        status,
        message,
        stack: null,
      },
    ],
    status: {
      status,
      message,
      stack: null,
    },
    asserts: [],
  };
}

const thrownError = new Error("abort reason");
const cancelReason = new Error("cancel reason");

const ts = new TransformStream();
const writer = ts.writable.getWriter();

let abortState = "pending";
let cancelState = "pending";
let closedState = "pending";

const abortPromise = writer.abort(thrownError).then(
  value => {
    abortState = `resolved:${String(value)}`;
  },
  error => {
    abortState = error === thrownError
      ? "rejected:same"
      : `rejected:${error && error.name ? error.name : String(error)}`;
  },
);

const cancelPromise = ts.readable.cancel(cancelReason).then(
  value => {
    cancelState = `resolved:${String(value)}`;
  },
  error => {
    cancelState = error === thrownError
      ? "rejected:same"
      : `rejected:${error && error.name ? error.name : String(error)}`;
  },
);

const closedPromise = writer.closed.then(
  value => {
    closedState = `resolved:${String(value)}`;
  },
  error => {
    closedState = error === thrownError
      ? "rejected:same"
      : `rejected:${error && error.name ? error.name : String(error)}`;
  },
);

Promise.allSettled([abortPromise, cancelPromise, closedPromise]).then(() => {
  finish(1, JSON.stringify({ abortState, cancelState, closedState }));
});
</script>
