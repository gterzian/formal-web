<!DOCTYPE html>
<meta charset="utf-8">
<title>transform terminate after cancel debug</title>
<script>
function finish(status, message) {
  window.__formalWebTestResult = {
    location: "",
    title: String(document.title || ""),
    tests: [
      {
        name: "transform terminate after cancel debug",
        status,
        message,
        stack: null,
      },
    ],
    status: {
      status,
      message,
      stack: null,
    },
    asserts: [],
  };
}

let controller;
const ts = new TransformStream({
  start(c) {
    controller = c;
  },
});

const cancelReason = { name: "cancelReason" };
let cancelState = "pending";
let closedState = "pending";
let terminateError = null;

const cancelPromise = ts.readable.cancel(cancelReason);

try {
  controller.terminate();
} catch (error) {
  terminateError = String(error);
}

const observedCancelPromise = cancelPromise.then(
  () => {
    cancelState = "resolved";
  },
  error => {
    cancelState = `rejected:${String(error)}`;
  },
);

const observedClosedPromise = ts.writable.getWriter().closed.then(
  () => {
    closedState = "resolved";
  },
  error => {
    closedState = `rejected:${error && error.name ? error.name : String(error)}`;
  },
);

Promise.allSettled([observedCancelPromise, observedClosedPromise]).then(() => {
  const state = { cancelState, closedState, terminateError };
  const passed = cancelState === "resolved" && closedState === "rejected:TypeError" && terminateError === null;
  finish(passed ? 0 : 1, JSON.stringify(state));
});
</script>
