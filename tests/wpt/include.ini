# The simplified wrapper expects `skip: true` at the root and explicit
# `skip: false` opt-ins for the suites or files you want to run by default.
skip: true

# CSS tests — only the CSS.supports() suite is enabled since those directly
# verify the `CSS` namespace object (CSS.supports) from the content crate.
# Other CSS suites depend on CSSOM, reftest support, getComputedStyle()
# property exposure, or property value round-trips — see
# tests/wpt/css-test-status.md for the full missing-API inventory.
[css]
  [css-conditional]
    [js]
      [CSS-supports-L3.html]
        skip: false
      [CSS-supports-L4.html]
        skip: false
      [CSS-supports-selector-detecting-invalid-in-logical-combinations.html]
        skip: false

[html]
  [dom]
    [documents]
      [dom-tree-accessors]
        [document.title-01.html]
          skip: false
        [document.title-03.html]
          skip: false
        [document.title-05.html]
          skip: false
    [elements]
      [global-attributes]
        [document-dir.html]
          skip: false
  [semantics]
    [embedded-content]
      [the-iframe-element]
        [iframe-display-none-with-object.html]
          skip: false
        [historical.html]
          skip: false
    [links]
      [links-created-by-a-and-area-elements]
        [htmlanchorelement_getter.html]
          skip: false
        [htmlanchorelement_attribute-getter-setter.html]
          skip: false
  [webappapis]
    [structured-clone]
      skip: false

[streams]
  [piping]
    skip: false
  [transform-streams]
    skip: false
  [writable-streams]
    skip: false
  [readable-byte-streams]
    skip: false
  [readable-streams]
    skip: false

[wasm]
  [jsapi]
    [constructor]
      [compile.any.js]
        skip: false

[dom]
  [nodes]
    [Element-hasAttribute.html]
      skip: false
    [Element-insertAdjacentText.html]
      skip: false
    [Element-remove.html]
      skip: false
    [Node-constants.html]
      skip: false

