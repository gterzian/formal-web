[read-min.any.js]
  disabled: |
    Boa GcRefCell BorrowError during re-entrant c.byobRequest property access.

    Call chain:
      reader.read(view, {min:N}) → pull_into → call_pull_if_needed
        → pull_algorithm.call(&controller_object, ec)   [ENTERS JS]
          → pull function: c.byobRequest → accessor getter
            → get_byob_request → controller.byob_request(ec) → BYOB request
          → byobRequest.respond(N) → controller.respond(N, ec)
            → early return (can_commit=false)
              → call_pull_if_needed [RE-ENTRANT]
                → pull_algorithm.call(&controller_object, ec) [ENTERS JS AGAIN]
                  → pull function: c.byobRequest
                    → __get__ on controller_object
                      → ordinary_get_own_property → obj.borrow() → PANIC

    The controller_object's GcRefCell is already mutably borrowed by
    Boa's internal property-access machinery (in get_by_name or the
    __get__ internal method dispatch).  Our code never holds a mutable
    borrow on JsObjects when calling into JS.  The exact Boa operation
    that holds the conflicting mutable borrow has not been identified
    (possibilities: the IC cache write at get_by_name line 72, or a
    RefMut in ordinary_get_prototype_of, or the __get__ vtable dispatch
    itself).

    To fix: identify which Boa internal operation holds the mutable
    borrow on the receiver JsObject during accessor getter invocation,
    and either (a) ensure it releases the borrow before calling the
    getter, or (b) restructure the stream code to avoid the re-entrant
    property access entirely (e.g. by reading the controller data once
    before the outer call_pull_if_needed and threading it through).

    Band-aid solutions that were considered and rejected:
    - Microtask deferral (async hack, violates spec synchronicity)
    - try_borrow fallback in with_object_any (crash is in Boa's own
      ordinary_get_own_property, not in our with_object_any)
    - Caching controller data on the struct (only handles one depth)
