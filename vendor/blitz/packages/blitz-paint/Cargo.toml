[package]
name = "blitz-paint"
description = "Paint a Blitz Document using anyrender"
documentation = "https://docs.rs/blitz-paint"
version = "0.3.0-alpha.4"
license = "MIT OR Apache-2.0"
homepage = "https://github.com/dioxuslabs/blitz"
repository = "https://github.com/dioxuslabs/blitz"
categories = ["gui"]
edition = "2024"
rust-version = "1.89.0"

[features]
default = ["svg"]
tracing = ["dep:tracing"]
svg = ["dep:anyrender_svg", "dep:usvg", "blitz-dom/svg"]
custom-widget = ["blitz-dom/custom-widget"]
font-embolden = []
apple-font-embolden = []

[dependencies]
# Blitz dependencies (in-repo)
anyrender = { version = "0.10.0" }
anyrender_svg = { version = "0.11.0", optional = true }
blitz-traits = { path = "../blitz-traits", default-features = false }
blitz-dom = { path = "../blitz-dom", default-features = false }

# Servo dependencies
style = { version = "0.17.0", package = "stylo" }
euclid = "0.22"

# DioxusLabs dependencies
taffy = { version = "=0.11.0-experimental-cache-fix.3", default-features = false, features = [
    "std",
    "flexbox",
    "grid",
    "block_layout",
    "content_size",
    "calc",
    "detailed_layout_info",
] }

# Linebender + WGPU dependencies
parley = { version = "0.9", default-features = false, features = ["std"] }
color = "0.3"
peniko = "0.6.0"
kurbo = "0.13.1"
usvg = { version = "0.46", optional = true }

# Other dependencies
tracing = { version = "0.1.40", optional = true }
