[package]
name = "blitz-dom"
description = "Blitz DOM implementation"
documentation = "https://docs.rs/blitz-dom"
version = "0.3.0-alpha.4"
license = "MIT OR Apache-2.0"
homepage = "https://github.com/dioxuslabs/blitz"
repository = "https://github.com/dioxuslabs/blitz"
categories = ["gui"]
edition = "2024"
rust-version = "1.89.0"

[features]
default = [
    "svg",
    "woff",
    "accessibility",
    "system_fonts",
    "file_input",
    "custom-widget"
]
custom-widget = ["dep:anyrender", "accessibility"]
tracing = ["dep:tracing"]
svg = ["dep:usvg"]
# WOFF decoding (using the "wuff" crate which is pure Rust)
woff = ["dep:wuff"]
accessibility = ["accesskit"]
system_fonts = ["parley/system"]
autofocus = []
floats = ["taffy/float_layout", "stylo_taffy/floats"]
file_input = []
incremental = []
parallel-construct = []
log_phase_times = ["debug_timer/enable"]

[dependencies]
# Blitz dependencies (in-repo)
blitz-traits = { path = "../blitz-traits", default-features = false }
stylo_taffy = { path = "../stylo_taffy", features = ["default"] }
debug_timer = { path = "../debug_timer" }

# Servo dependencies
style = { version = "0.17.0", package = "stylo" }
selectors = { version = "0.38.0", package = "selectors" }
cssparser = "0.37.0"
style_config = { version = "0.17.0", package = "stylo_static_prefs" }
style_traits = { version = "0.17.0", package = "stylo_traits" }
style_dom = { version = "0.17.0", package = "stylo_dom" }
app_units = "0.7.5"
euclid = "0.22"
atomic_refcell = "0.1.13"
markup5ever = "0.39.0"
smallvec = "1"

# DioxusLabs dependencies
taffy = { version = "=0.11.0-experimental-cache-fix.3", default-features = false, features = [
    "std",
    "flexbox",
    "grid",
    "block_layout",
    "content_size",
    "calc",
    "detailed_layout_info",
] }
anyrender = { version = "0.10.0", optional = true }

# Linebender/Fontations dependencies
accesskit = { version = "0.24", optional = true }
parley = { version = "0.9", default-features = false, features = ["std"] }
skrifa = { version = "0.42", default-features = false, features = ["std"] }
linebender_resource_handle = "0.1"
color = "0.3"
kurbo = "0.13.1"

# Other dependencies
slab = "0.4.9"
bitflags = "2.8.0"
tracing = { version = "0.1.40", optional = true }
rayon = "1"

# Media & Decoding
image = { version = "=0.25.6", default-features = false }
usvg = { version = "0.46", optional = true }
wuff = { version = "0.2", optional = true }
html-escape = "0.2.13"
percent-encoding = "2.3.1"

# IO & Networking
url = "2.5.0"

# Input
keyboard-types = "0.7"
cursor-icon = "1"
thread_local = "1"

# WASM
web-time = "1"

# HACK: Blitz doesn't need to depend on objc2 directly. But this feature flag is necessary
# to prevent debug builds from panicking.
[target.'cfg(any(target_vendor = "apple"))'.dependencies]
objc2 = { version = "0.6", features = ["disable-encoding-assertions"] }
