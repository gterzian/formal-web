[profile.profile]
inherits = "release"
debug = true

[profile.production]
inherits = "release"
opt-level = 3
debug = false
lto = true
codegen-units = 1
strip = true
incremental = false

[profile.p2]
inherits = "production"
opt-level = 2

[profile.small]
inherits = "production"
opt-level = "s"
panic = "abort"

[profile.small-panic]
inherits = "small"
panic = "unwind"

[profile.tiny]
inherits = "small"
opt-level = "z"

[profile.tiny.package.fearless_simd]
opt-level = 3
[profile.tiny.package.vello_cpu]
opt-level = 3
[profile.tiny.package.taffy]
opt-level = 3
[profile.tiny.package.harfrust]
opt-level = 3
[profile.tiny.package.skrifa]
opt-level = 3

# This is a "virtual package"
# It is not meant to be published, but is used so "cargo run --example XYZ" works properly
[package]
name = "blitz-examples"
version = "0.0.1"
authors = ["Jonathan Kelley"]
edition = "2024"
description = "Top level crate for Blitz"
license = "MIT OR Apache-2.0"
keywords = ["dom", "ui", "gui", "react", "wasm"]
rust-version = "1.89.0"
publish = false

[dev-dependencies]
anyrender = { workspace = true }
anyrender_vello = { workspace = true }
anyrender_vello_cpu = { workspace = true, features = ["multithreading"] }
anyrender_vello_hybrid = { workspace = true }
blitz-dom = { workspace = true, features = ["default"] }
blitz-html = { workspace = true }
blitz-traits = { workspace = true }
blitz-paint = { workspace = true }
blitz-shell = { workspace = true }
blitz-net = { workspace = true }
blitz = { workspace = true, features = ["net"] }
dioxus = { workspace = true }
dioxus-native = { workspace = true, features = [
    "vello-hybrid",
    "floats",
    "svg",
    "prelude",
] }
euclid = { workspace = true }
reqwest = { workspace = true }
tokio = { workspace = true, features = ["macros"] }
image = { workspace = true }
png = { workspace = true }
peniko = { workspace = true }
color = { workspace = true }
env_logger = "0.11"
tracing-subscriber = "0.3"



